<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智小红 - 采集进度监控</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff6b6b;
            margin: 0 0 10px 0;
        }
        .status {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            flex: 1;
            min-width: 200px;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .status-value {
            font-size: 36px;
            font-weight: bold;
            color: #ff6b6b;
        }
        .status-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-line {
            margin: 5px 0;
        }
        .log-info { color: #4ec9b0; }
        .log-success { color: #b5cea8; }
        .log-warning { color: #dcdcaa; }
        .log-error { color: #f48771; }
        .btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔍 智小红 - 小红书数据采集监控</h1>
            <p style="color: #666;">实时监控采集进度和数据分析</p>
            <button class="btn" onclick="refreshData()">🔄 刷新数据</button>
        </div>

        <div class="card">
            <h2>📊 采集统计</h2>
            <div class="status">
                <div class="status-item">
                    <div class="status-value" id="totalCollected">0</div>
                    <div class="status-label">已采集笔记</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="currentKeyword">-</div>
                    <div class="status-label">当前关键词</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="avgLikes">0</div>
                    <div class="status-label">平均点赞</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="avgCollects">0</div>
                    <div class="status-label">平均收藏</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">
                    <span id="progressText">0%</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📝 实时日志</h2>
            <div class="log" id="logContainer">
                <div class="log-line log-info">[系统] 等待采集任务启动...</div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据（实际应用中从 JSON 文件读取）
        let collectedCount = 0;
        let totalTarget = 50;

        function refreshData() {
            // 实际应用中这里会读取最新的 JSON 文件
            // 现在使用模拟数据演示
            
            const logContainer = document.getElementById('logContainer');
            const now = new Date().toLocaleTimeString();
            
            // 模拟日志
            const logs = [
                `[${now}] [信息] 开始采集关键词：AI 教程`,
                `[${now}] [成功] 采集第 1 条笔记：AI 绘画教程... (点赞:1523)`,
                `[${now}] [成功] 采集第 2 条笔记：自媒体运营技巧... (点赞:892)`,
                `[${now}] [等待] 等待 6 秒（防风控）...`,
                `[${now}] [成功] 采集第 3 条笔记：爆款标题公式... (点赞:2341)`,
            ];
            
            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-line';
                if (log.includes('[成功]')) div.classList.add('log-success');
                else if (log.includes('[等待]')) div.classList.add('log-warning');
                else if (log.includes('[错误]')) div.classList.add('log-error');
                else div.classList.add('log-info');
                div.textContent = log;
                logContainer.appendChild(div);
            });
            
            // 滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // 更新统计
            collectedCount += 3;
            const progress = (collectedCount / totalTarget * 100);
            
            document.getElementById('totalCollected').textContent = collectedCount;
            document.getElementById('currentKeyword').textContent = 'AI 教程';
            document.getElementById('avgLikes').textContent = '1585';
            document.getElementById('avgCollects').textContent = '342';
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress.toFixed(1) + '%';
            
            // 提示
            const btn = document.querySelector('.btn');
            btn.textContent = '✅ 已刷新';
            setTimeout(() => {
                btn.textContent = '🔄 刷新数据';
            }, 2000);
        }

        // 页面加载时初始化
        window.onload = function() {
            refreshData();
            
            // 每 10 秒自动刷新
            setInterval(refreshData, 10000);
        };
    </script>
</body>
</html>

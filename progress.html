<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六位一体 - 项目进度监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .phase:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .phase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .phase-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .phase-progress {
            background: #f0f0f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .phase-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .task-list {
            margin-top: 15px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #667eea;
        }

        .task-name {
            flex: 1;
            color: #333;
        }

        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-done {
            background: #d4edda;
            color: #155724;
        }

        .status-progress {
            background: #fff3cd;
            color: #856404;
        }

        .status-pending {
            background: #f8f9fa;
            color: #666;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .last-update {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 六位一体 - 智能内容生产流水线</h1>
            <p class="subtitle">项目进度实时监控</p>
            <button class="refresh-btn" onclick="loadProgress()" style="margin-top: 15px;">
                🔄 刷新进度
            </button>
            <p class="last-update" id="lastUpdate">最后更新：--</p>
        </header>

        <div class="overview">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">-</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">-</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inProgressTasks">-</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="overallProgress">-</div>
                <div class="stat-label">完成率</div>
            </div>
        </div>

        <div class="progress-section">
            <h2 class="section-title">📊 阶段进度</h2>
            <div id="phasesContainer">
                <div class="loading">正在加载进度数据...</div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据（实际从 task_plan.md 解析）
        const projectData = {
            title: "六位一体 - 智能内容生产流水线",
            phases: [
                {
                    name: "Phase 1: MVP 开发",
                    status: "in_progress",
                    progress: 17.9,
                    tasks: [
                        { name: "TrendRadar 安装和配置", status: "done" },
                        { name: "知乎热榜抓取", status: "done" },
                        { name: "B 站热门抓取", status: "done" },
                        { name: "并行优化（0.5 秒）", status: "done" },
                        { name: "抖音 API 对接", status: "pending" },
                        { name: "微博 API 对接", status: "pending" },
                        { name: "小红书 API 对接", status: "pending" },
                        { name: "定时任务（每小时）", status: "pending" },
                        { name: "ScriptBot 创建", status: "pending" },
                        { name: "SOUL.md 品牌调性定义", status: "pending" },
                        { name: "LLM 脚本生成模板", status: "pending" },
                        { name: "A/B 测试框架", status: "pending" },
                        { name: "素材库结构设计", status: "pending" },
                        { name: "向量数据库搭建", status: "pending" },
                        { name: "语义匹配算法", status: "pending" },
                        { name: "音画同步逻辑", status: "pending" },
                        { name: "ffmpeg 自动剪辑", status: "pending" },
                        { name: "模板系统", status: "pending" },
                        { name: "批量渲染", status: "pending" },
                        { name: "质量检查", status: "pending" },
                        { name: "B 站 API 对接", status: "pending" },
                        { name: "YouTube API 对接", status: "pending" },
                        { name: "发布时间优化", status: "pending" },
                        { name: "多账号管理", status: "pending" },
                        { name: "播放数据统计", status: "pending" },
                        { name: "转化率追踪", status: "pending" },
                        { name: "报表生成", status: "pending" },
                        { name: "可视化 UI", status: "pending" }
                    ]
                },
                {
                    name: "Phase 2: 核心功能",
                    status: "pending",
                    progress: 0,
                    tasks: [
                        { name: "抖音发布 API", status: "pending" },
                        { name: "快手发布 API", status: "pending" },
                        { name: "小红书发布 API", status: "pending" },
                        { name: "微信视频号 API", status: "pending" },
                        { name: "淘宝直播 API", status: "pending" },
                        { name: "多模型支持", status: "pending" },
                        { name: "脚本质量评分", status: "pending" },
                        { name: "自动优化建议", status: "pending" },
                        { name: "热点预测算法", status: "pending" },
                        { name: "私有素材上传", status: "pending" },
                        { name: "智能标签系统", status: "pending" },
                        { name: "版权检测", status: "pending" },
                        { name: "素材推荐", status: "pending" },
                        { name: "4K 渲染支持", status: "pending" },
                        { name: "多分辨率适配", status: "pending" },
                        { name: "水印系统", status: "pending" },
                        { name: "字幕生成", status: "pending" }
                    ]
                },
                {
                    name: "Phase 3: 规模化",
                    status: "pending",
                    progress: 0,
                    tasks: [
                        { name: "渲染集群搭建", status: "pending" },
                        { name: "负载均衡", status: "pending" },
                        { name: "自动扩缩容", status: "pending" },
                        { name: "故障转移", status: "pending" },
                        { name: "并发抓取优化", status: "pending" },
                        { name: "批量处理优化", status: "pending" },
                        { name: "缓存策略", status: "pending" },
                        { name: "CDN 加速", status: "pending" },
                        { name: "国内平台（30+）", status: "pending" },
                        { name: "海外平台（35+）", status: "pending" },
                        { name: "API 统一管理", status: "pending" },
                        { name: "账号池管理", status: "pending" }
                    ]
                },
                {
                    name: "Phase 4: 优化迭代",
                    status: "pending",
                    progress: 0,
                    tasks: [
                        { name: "38 项指标追踪", status: "pending" },
                        { name: "智能归因分析", status: "pending" },
                        { name: "A/B 测试自动化", status: "pending" },
                        { name: "趋势预测", status: "pending" },
                        { name: "发布时间优化", status: "pending" },
                        { name: "标题标签优化", status: "pending" },
                        { name: "内容策略优化", status: "pending" },
                        { name: "投放策略优化", status: "pending" },
                        { name: "数据→创意反馈", status: "pending" },
                        { name: "自动策略调整", status: "pending" },
                        { name: "异常检测告警", status: "pending" },
                        { name: "自学习系统", status: "pending" }
                    ]
                }
            ]
        };

        function getStatusText(status) {
            switch(status) {
                case 'done': return '✅';
                case 'in_progress': return '🔄';
                case 'pending': return '⏳';
                default: return '❓';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'done': return 'status-done';
                case 'in_progress': return 'status-progress';
                case 'pending': return 'status-pending';
                default: return '';
            }
        }

        function getStatusLabel(status) {
            switch(status) {
                case 'done': return '已完成';
                case 'in_progress': return '进行中';
                case 'pending': return '待开始';
                default: return status;
            }
        }

        function renderPhases() {
            const container = document.getElementById('phasesContainer');
            container.innerHTML = '';

            projectData.phases.forEach((phase, index) => {
                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'phase';
                
                const tasksHtml = phase.tasks.map(task => `
                    <div class="task-item">
                        <input type="checkbox" class="task-checkbox" 
                            ${task.status === 'done' ? 'checked' : ''} 
                            disabled>
                        <span class="task-name">${task.name}</span>
                        <span class="task-status ${getStatusClass(task.status)}">
                            ${getStatusLabel(task.status)}
                        </span>
                    </div>
                `).join('');

                phaseDiv.innerHTML = `
                    <div class="phase-header">
                        <div class="phase-title">${getStatusText(phase.status)} ${phase.name}</div>
                        <div style="font-size: 18px; font-weight: bold; color: #667eea;">
                            ${phase.progress.toFixed(1)}%
                        </div>
                    </div>
                    <div class="phase-progress">
                        <div class="phase-bar" style="width: ${phase.progress}%">
                            ${phase.progress >= 10 ? phase.progress.toFixed(1) + '%' : ''}
                        </div>
                    </div>
                    <div class="task-list">
                        ${tasksHtml}
                    </div>
                `;

                container.appendChild(phaseDiv);
            });
        }

        function updateStats() {
            let total = 0;
            let completed = 0;
            let inProgress = 0;

            projectData.phases.forEach(phase => {
                phase.tasks.forEach(task => {
                    total++;
                    if (task.status === 'done') completed++;
                    if (task.status === 'in_progress') inProgress++;
                });
            });

            const progress = total > 0 ? (completed / total * 100) : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('inProgressTasks').textContent = inProgress;
            document.getElementById('overallProgress').textContent = progress.toFixed(1) + '%';
        }

        function loadProgress() {
            // 实际应用中这里会读取 task_plan.md 文件
            // 现在使用模拟数据
            renderPhases();
            updateStats();
            
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                '最后更新：' + now.toLocaleString('zh-CN');
            
            // 添加刷新动画
            const btn = document.querySelector('.refresh-btn');
            btn.textContent = '✅ 已刷新';
            setTimeout(() => {
                btn.textContent = '🔄 刷新进度';
            }, 2000);
        }

        // 页面加载时初始化
        window.onload = function() {
            loadProgress();
            
            // 每 30 秒自动刷新
            setInterval(loadProgress, 30000);
        };
    </script>
</body>
</html>
